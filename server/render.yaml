services:
  - type: web
    name: stocksense-ai-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEWS_API_KEY
        sync: false
      - key: STOCK_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
